appId: com.pi67.desktop
productName: Pi-67 Desktop
icon: eng/packaging/icon.png
asar: true
directories:
  output: artifacts/release
files:
  - apps/desktop/dist/**
  - apps/agent-host/dist/**
  - apps/renderer/dist/**
  - packages/pi-runtime/dist/**
  - packages/protocol/dist/**
  - packages/domain/dist/**
  - node_modules/**
  - package.json
asarUnpack:
  - node_modules/@silvia-odwyer/photon-node/**
extraResources:
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: licenses
    to: licenses
protocols:
  - name: Pi-67 Desktop
    schemes:
      - pi67
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Pi-67-Desktop-${version}-win-x64.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: Pi-67-Desktop-${version}-mac-arm64.${ext}
  category: public.app-category.developer-tools
  minimumSystemVersion: 12.0.0
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: eng/packaging/entitlements.mac.plist
  entitlementsInherit: eng/packaging/entitlements.mac.plist
publish:
  provider: github
  owner: bigKING67
  repo: pi-67-desktop
