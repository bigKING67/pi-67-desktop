name: Signed release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-2025
            arch: x64
            command: package:win
          - platform: macos-arm64
            os: macos-15
            arch: arm64
            command: package:mac
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11.16.0
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Verify runner architecture
        shell: bash
        run: |
          node -e "if (process.arch !== '${{ matrix.arch }}') throw new Error('Unexpected runner arch: ' + process.arch)"
      - name: Validate signing credentials
        shell: bash
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -eu
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            [[ -n "$WINDOWS_CSC_LINK" && -n "$WINDOWS_CSC_KEY_PASSWORD" ]] || { echo "Windows signing credentials are required." >&2; exit 1; }
          else
            [[ -n "$MACOS_CSC_LINK" && -n "$MACOS_CSC_KEY_PASSWORD" ]] || { echo "macOS signing credentials are required." >&2; exit 1; }
            [[ -n "$APPLE_API_KEY_P8" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]] || { echo "Apple notarization credentials are required." >&2; exit 1; }
          fi
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check
      - name: Prepare Apple API key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
      - name: Build signed package
        run: corepack pnpm run ${{ matrix.command }}
        env:
          CSC_LINK: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Smoke packaged Electron runtime
        run: corepack pnpm run package:smoke
      - name: Verify Authenticode
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = Get-ChildItem artifacts/release/Pi-67-Desktop-*-win-x64.exe | Select-Object -First 1
          $signature = Get-AuthenticodeSignature $artifact.FullName
          if ($signature.Status -ne 'Valid') { throw "Invalid Authenticode status: $($signature.Status)" }
      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --verify --deep --strict "artifacts/release/mac-arm64/Pi-67 Desktop.app"
          spctl --assess --type execute --verbose "artifacts/release/mac-arm64/Pi-67 Desktop.app"
          xcrun stapler validate artifacts/release/Pi-67-Desktop-*-mac-arm64.dmg
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: |
            artifacts/release/Pi-67-Desktop-*
            artifacts/release/latest*.yml
            artifacts/release/*.blockmap
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts/release
          merge-multiple: true
      - run: corepack pnpm run release:manifest
      - run: corepack pnpm run release:verify
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" artifacts/release/* --verify-tag --generate-notes
