name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-and-native-smoke:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            expectedArch: x64
          - name: macOS arm64
            os: macos-15
            expectedArch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Verify runner architecture
        shell: bash
        run: node -e "if (process.arch !== '${{ matrix.expectedArch }}') throw new Error('Expected ${{ matrix.expectedArch }}, got ' + process.arch)"
      - name: Install frozen dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Quality gates
        run: corepack pnpm run check
      - name: Build
        run: corepack pnpm run build
      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install --no-shell chromium
      - name: Renderer and Electron smoke
        run: corepack pnpm exec playwright test
      - name: Build unsigned native smoke package
        run: corepack pnpm run package:native:unsigned
      - name: Smoke packaged Electron runtime
        run: corepack pnpm run package:smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-evidence-${{ matrix.expectedArch }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
