name: Publish unsigned alpha

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Immutable 40-character commit SHA to build
        required: true
        type: string

permissions:
  contents: write

jobs:
  unsigned-alpha:
    runs-on: windows-2025
    timeout-minutes: 60
    env:
      CI: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      PI_TELEMETRY: "0"
      PI67_BUILD_WORKFLOW: .github/workflows/release-alpha.yml
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Verify immutable source revision
        shell: pwsh
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          if ($env:SOURCE_REF -notmatch '^[0-9a-fA-F]{40}$') {
            throw "source_ref must be a full 40-character commit SHA."
          }
          $actual = (git rev-parse HEAD).Trim()
          if ($actual -ne $env:SOURCE_REF.ToLowerInvariant()) {
            throw "Checked-out revision $actual does not match source_ref $($env:SOURCE_REF)."
          }
          "PI67_SOURCE_REVISION=$actual" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.302
      - name: Build unsigned controlled-test artifacts
        shell: pwsh
        run: |
          npm ci
          npm run version:verify
          npm run check
          npm test
          npm run build:node
          dotnet restore Pi67.Desktop.slnx --locked-mode
          dotnet test tests/Pi67.Desktop.Domain.Tests/Pi67.Desktop.Domain.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Pi67.Desktop.Application.Tests/Pi67.Desktop.Application.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Pi67.Desktop.PiRpc.Tests/Pi67.Desktop.PiRpc.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Pi67.Desktop.Infrastructure.Windows.Tests/Pi67.Desktop.Infrastructure.Windows.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Pi67.Desktop.Presentation.Tests/Pi67.Desktop.Presentation.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Pi67.Desktop.Architecture.Tests/Pi67.Desktop.Architecture.Tests.csproj --configuration Release --no-restore
          dotnet build tests/Pi67.Desktop.App.StaticTests/Pi67.Desktop.App.StaticTests.csproj --configuration Release --no-restore
          dotnet build tests/Pi67.Desktop.UiTests/Pi67.Desktop.UiTests.csproj --configuration Release --no-restore
          npm install --global @earendil-works/pi-coding-agent@0.80.6
          $env:PI67_TEST_PI_PACKAGE_ROOT = Join-Path (npm root --global) "@earendil-works/pi-coding-agent"
          npm test --workspace @bigking67/pi67-desktop-bridge
          $env:PI67_RUN_LIVE_PI_TESTS = "1"
          $env:PI67_TEST_PI_EXECUTABLE = (Get-Command pi.cmd).Source
          dotnet test tests/Pi67.Desktop.IntegrationTests/Pi67.Desktop.IntegrationTests.csproj --configuration Release --no-restore
          ./eng/packaging/build.ps1 -Configuration Release
          npm run verify:no-embedded-pi -- --root artifacts/app/win-x64
          npm run verify:artifact-budget -- --root artifacts/app/win-x64
          npm run release:sbom -- --output artifacts/release/pi67-desktop.cdx.json
          npm run release:manifest -- --root artifacts/release --output artifacts/release/release-manifest.json
          npm run release:provenance -- --root artifacts/release --output artifacts/release/provenance.intoto.json
          npm run release:checksums -- --root artifacts/release --output artifacts/release/SHA256SUMS
          npm run release:verify -- --root artifacts/release
      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v0.1.0-alpha.1
          target_commitish: ${{ inputs.source_ref }}
          name: Pi-67 Desktop 0.1.0-alpha.1 (unsigned)
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Controlled-test alpha only. Artifacts are unsigned and are not a public trust release.
            Verify release-manifest.json, SHA256SUMS, provenance.intoto.json, compatibility.json, and the CycloneDX SBOM before use.
          files: artifacts/release/*
